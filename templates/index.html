<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YETEMNET</title>  <!-- This shows in the tab -->
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<style>
.background-page {
    background-image: url("{% static 'images/Yetenbi_1.png' %}");
    /* 'cover' expands the image to leave zero blank spaces regardless of window size */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}
</style>


<!-- 1. Make the body a full-height column flexbox container -->
<body class="d-flex flex-column min-vh-100 overflow-hidden">

    <!-- Header (Navbar sits naturally at the top) -->
    <nav id="header" class="navbar navbar-dark bg-dark shadow-sm py-1">
        <div class="container-fluid d-flex flex-wrap justify-content-between align-items-center gap-3">

            <!-- Branding Section (Left Side) -->
            <div class="d-flex flex-column">
                <span class="h4 fs-1 text-white mb-0 font-weight-bold">YETEMNET</span>
                <span class="text-white-50" style="font-size: 14px;">Äthiopisches Restaurant</span>
            </div>

            <!-- Buttons Section (Right Side) -->
            <div class="d-flex flex-wrap gap-4">
                <button class="btn bg-dark-subtle px-8 py-1 fs-2 text-black text-center" style="min-width: 240px;">
                    Speisekarte<br>
                    <span style="font-size: 10px; display: block; opacity: 0.85;">የምግብ ዝርዝር</span>
                </button>
                <button class="btn bg-dark-subtle px-8 py-1 fs-2 text-black text-center" style="min-width: 240px;">
                    Fotos<br>
                    <span style="font-size: 10px; display: block; opacity: 0.85;">ፎቶዎች</span>
                </button>
                <button class="btn bg-dark-subtle px-8 py-1 fs-2 text-black text-center" style="min-width: 240px;">
                    Geschichte<br>
                    <span style="font-size: 10px; display: block; opacity: 0.85;">ታሪክ</span>
                </button>
                <button class="btn bg-dark-subtle px-8 py-1 fs-2 text-black text-center" style="min-width: 240px;">
                    Kontakt<br>
                    <span style="font-size: 10px; display: block; opacity: 0.85;">አድራሻ</span>
                </button>
            </div>

        </div>
    </nav>

    <!-- Background Div (Now centered with Bootstrap Flex Utilities) -->
    <div class="background-page flex-grow-1 d-flex flex-column justify-content-center align-items-center text-center">

        <!-- EXAMPLE CONTENT: Boxed Welcome card over the image -->
        <div class="p-5 rounded shadow-lg" style="background-color: rgba(0, 0, 0, 0.3); max-width: 350px; max-height: 65vh; overflow-y: auto;">
            <h1 class="text-white display-4 font-weight-bold mb-3">Willkommen bei Yetemnet</h1>
            <p class="text-light fs-4 mb-4">Erleben Sie die Vielfalt der authentischen äthiopischen Küche.</p>
            <p class="text-warning h7">እንኳን ደህና መጡ!</p>
        </div>

    </div>

</body>
</html>
