<!DOCTYPE html>
<html lang="en">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YETEMNET</title>  <!-- This shows in the tab -->
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<style>
.background-page {
    background-image: url("{% static 'images/Yetenbi_1.png' %}");
    background-size: contain;        /* fills screen */
    background-position: center;     /* centers image */
    background-repeat: no-repeat;    /* no repeating */
    min-height: 98vh;
}
</style>




<body class="background-page overflow-hidden">
    <!--header-->
    <nav id="header" class="navbar navbar-dark bg-dark shadow-sm py-3">
        <!-- container-fluid allows items to sit side-by-side or wrap naturally -->
        <div class="container-fluid d-flex flex-wrap justify-content-between align-items-center gap-3">

            <!-- Branding Section (Left Side) -->
            <div class="d-flex flex-column">
                <span class="h4 fs-1 text-white mb-0 font-weight-bold">YETEMNET</span>
                <span class="text-white-50" style="font-size: 14px;">Äthiopisches Restaurant</span>
            </div>

            <!-- Buttons Section (Right Side / Wraps below on small screens) -->
            <!-- px-4 adds side padding so buttons aren't small; style sets a standard matching width -->
            <div class="d-flex flex-wrap gap-4">
                <button class="btn bg-dark-subtle px-8 py-2 fs-2 text-black text-center" style="min-width: 240px;">
                    Speisekarte<br>
                    <span style="font-size: 10px; display: block; opacity: 0.85;">የምግብ ዝርዝር</span>
                </button>

                <button class="btn bg-dark-subtle px-8 py-2 fs-2 text-black text-center" style="min-width: 240px;">
                    Fotos<br>
                    <span style="font-size: 10px; display: block; opacity: 0.85;">ፎቶዎች</span>
                </button>

                <button class="btn bg-dark-subtle px-8 py-2 fs-2 text-black text-center" style="min-width: 240px;">
                    Geschichte<br>
                    <span style="font-size: 10px; display: block; opacity: 0.85;">ታሪክ</span>
                </button>

                <button class="btn bg-dark-subtle px-8 py-2 fs-2 text-black text-center" style="min-width: 240px;">
                    Kontakt<br>
                    <span style="font-size: 10px; display: block; opacity: 0.85;">አድራሻ</span>
                </button>
            </div>

        </div>
    </nav>
</body>
</html>
